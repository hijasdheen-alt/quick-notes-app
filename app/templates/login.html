{% extends 'base.html' %}

{% block title %}Login | SecureNotes{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Login to securely access your notes</p>
    </div>
    
    <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem; padding: 0.75rem;">
            Log In
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        <span style="color: var(--text-secondary);">Don't have an account?</span>
        <a href="{{ url_for('auth.register') }}" style="color: var(--primary); text-decoration: none; font-weight: 600; margin-left: 0.25rem;">Sign Up</a>
    </div>
</div>
{% endblock %}
