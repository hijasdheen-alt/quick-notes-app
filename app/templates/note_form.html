{% extends 'base.html' %}

{% block title %}{{ action }} Note | SecureNotes{% endblock %}

{% block content %}
<div class="auth-card" style="max-width: 600px; margin: 2rem auto;">
    <div class="auth-header" style="text-align: left; margin-bottom: 1.5rem;">
        <h2>{{ action }} Note</h2>
        <p>Keep your note content encrypted and secure</p>
    </div>
    
    <form action="{% if action == 'Create' %}{{ url_for('notes.create_note') }}{% else %}{{ url_for('notes.edit_note', note_id=note.id) }}{% endif %}" method="POST">
        <div class="form-group">
            <label for="title" class="form-label">Title</label>
            <input type="text" id="title" name="title" class="form-control" placeholder="Enter note title..." value="{% if note %}{{ note.title }}{% endif %}" required maxlength="200">
        </div>
        
        <div class="form-group">
            <label for="content" class="form-label">Content</label>
            <textarea id="content" name="content" class="form-control" placeholder="Write your note here..." required>{% if note %}{{ note.content }}{% endif %}</textarea>
        </div>
        
        <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 1.5rem;">
            <a href="{{ url_for('notes.dashboard') }}" class="btn btn-secondary">
                Cancel
            </a>
            <button type="submit" class="btn btn-primary">
                Save Note
            </button>
        </div>
    </form>
</div>
{% endblock %}
